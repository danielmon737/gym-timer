<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#090909">
  <title>GYM TIMER</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-title" content="Gym Timer">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090909;
      --surface: #131313;
      --border: #252525;
      --go: #C8FF00;
      --rest: #FF3535;
      --neutral: #666;
      --text: #EBEBEB;
      --dim: #333;
      --accent: #3B82F6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      height: 100%; overflow: hidden;
      user-select: none; -webkit-user-select: none;
    }

    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      padding: max(env(safe-area-inset-top), 20px) 16px max(env(safe-area-inset-bottom), 20px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.18s ease;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── MODE SELECT ── */
    #screen-mode { justify-content: center; gap: 10px; }
    .mode-header { text-align: center; margin-bottom: 20px; }
    .mode-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px; letter-spacing: 8px;
      color: var(--go); line-height: 1;
    }
    .mode-header p {
      font-size: 13px; color: var(--neutral);
      letter-spacing: 3px; text-transform: uppercase; margin-top: 6px;
    }

    .mode-btn {
      background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 22px 20px;
      cursor: pointer; text-align: center;
      transition: border-color 0.1s, transform 0.1s;
      position: relative; overflow: hidden;
    }
    .mode-btn:active { transform: scale(0.97); border-color: var(--go); }
    .mode-btn .mode-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 3px; color: var(--text);
    }

    .autolock-tip {
      text-align: center; margin-top: 14px;
      padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 11px; color: var(--neutral);
      letter-spacing: 1px; line-height: 1.6;
    }
    .autolock-tip strong { color: var(--text); }

    /* ── CONFIG ── */
    #screen-config { justify-content: flex-start; }

    .config-top-bar {
      display: flex; align-items: stretch; gap: 10px;
      margin-bottom: 16px; padding-top: 4px; flex-shrink: 0;
    }
    .back-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; letter-spacing: 2px;
      padding: 14px 20px; border-radius: 10px;
      cursor: pointer; text-transform: uppercase;
      transition: border-color 0.1s, background 0.1s;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .back-btn .back-arrow { font-size: 24px; line-height: 1; color: var(--go); }
    .back-btn:active { border-color: var(--go); background: rgba(200,255,0,0.06); }

    .config-title-box {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
    }
    .config-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 3px; color: var(--go);
    }

    /* ── SUBMODE TABS ── */
    .submode-tabs {
      display: flex; gap: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      margin-bottom: 16px; flex-shrink: 0;
    }
    .submode-tab {
      flex: 1; padding: 12px 6px; text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px; letter-spacing: 2px;
      color: var(--neutral); cursor: pointer;
      transition: color 0.15s, background 0.15s;
      border: none; background: none;
    }
    .submode-tab + .submode-tab { border-left: 1px solid var(--border); }
    .submode-tab.active { color: var(--bg); background: var(--go); }

    .config-body {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; gap: 14px;
    }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--neutral);
    }

    /* ── NUMBER INPUT ── */
    .number-input {
      display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .num-btn {
      background: none; border: none; color: var(--go); font-size: 30px;
      width: 60px; height: 60px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-family: 'Bebas Neue', sans-serif;
    }
    .num-btn:active { background: rgba(200,255,0,0.08); }
    .num-display {
      flex: 1; text-align: center; font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; color: var(--text); letter-spacing: 2px;
    }

    /* ── SCROLL PICKER ── */
    .picker-row {
      display: flex; align-items: stretch;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; height: 180px;
      position: relative;
    }
    .picker-col { flex: 1; position: relative; overflow: hidden; }
    .picker-col + .picker-col { border-left: 1px solid var(--border); }
    .picker-col-label {
      position: absolute; top: 6px; left: 0; right: 0;
      text-align: center; font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--neutral);
      z-index: 5; pointer-events: none;
    }
    .picker-scroller {
      height: 100%; overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .picker-scroller::-webkit-scrollbar { display: none; }
    .picker-item {
      height: 60px; display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px; letter-spacing: 2px; color: var(--dim);
      scroll-snap-align: center; transition: color 0.15s, transform 0.15s;
    }
    .picker-item.selected { color: var(--text); transform: scale(1.08); }
    .picker-row::before {
      content: ''; position: absolute;
      top: 50%; left: 0; right: 0; height: 60px;
      transform: translateY(-50%);
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      background: rgba(200,255,0,0.03);
      pointer-events: none; z-index: 3;
    }
    .picker-col::before, .picker-col::after {
      content: ''; position: absolute; left: 0; right: 0;
      height: 50px; z-index: 4; pointer-events: none;
    }
    .picker-col::before { top: 0; background: linear-gradient(to bottom, var(--surface) 20%, transparent); }
    .picker-col::after { bottom: 0; background: linear-gradient(to top, var(--surface) 20%, transparent); }
    .picker-separator {
      display: flex; align-items: center; justify-content: center;
      width: 24px; flex-shrink: 0; font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; color: var(--neutral);
    }

    /* ── 3-COLUMN PICKER ROW ── */
    .triple-picker {
      display: flex; gap: 8px; align-items: stretch;
    }
    .triple-picker .picker-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .triple-picker .picker-group-label {
      text-align: center; font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--neutral);
    }
    .triple-picker .picker-row { height: 170px; }

    .start-btn {
      background: var(--go); color: #090909;
      border: none; border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 5px;
      padding: 18px; cursor: pointer; width: 100%;
      transition: transform 0.1s, opacity 0.1s;
      margin-top: 14px; flex-shrink: 0;
    }
    .start-btn:active { transform: scale(0.98); opacity: 0.88; }

    /* ── PRE-COUNTDOWN ── */
    #screen-countdown { justify-content: center; align-items: center; }
    .cd-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(140px, 42vw, 260px);
      line-height: 1; color: var(--go); opacity: 0; transform: scale(1.6);
    }
    .cd-number.pop { animation: cdPop 0.75s ease-out forwards; }
    @keyframes cdPop {
      0%   { opacity: 0; transform: scale(1.8); }
      20%  { opacity: 1; transform: scale(1); }
      70%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.7); }
    }
    .cd-label {
      font-size: 13px; letter-spacing: 4px;
      text-transform: uppercase; color: var(--neutral); margin-top: 20px;
    }

    /* ── TIMER ── */
    #screen-timer { justify-content: space-between; align-items: stretch; }
    .timer-top { display: flex; justify-content: space-between; align-items: center; padding-top: 4px; }
    .phase-badge {
      font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 4px;
      padding: 6px 16px; border-radius: 5px;
      background: var(--go); color: #090909;
      transition: background 0.25s, color 0.25s;
    }
    .phase-badge.rest { background: var(--rest); color: #fff; }
    .phase-badge.done { background: var(--dim); color: var(--neutral); }

    .round-display {
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--neutral); text-align: right; line-height: 1.3;
    }
    .round-display strong {
      display: block; font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; color: var(--text); letter-spacing: 1px;
    }

    .timer-main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 16px;
    }
    .big-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 28vw, 150px);
      line-height: 0.9; letter-spacing: 6px;
      color: var(--text); transition: color 0.25s;
    }
    .big-time.go { color: var(--go); }
    .big-time.rest { color: var(--rest); }
    .big-time.done { color: var(--dim); }

    .progress-track { width: 100%; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%; border-radius: 3px; background: var(--go);
      transition: width 0.08s linear, background 0.25s;
    }
    .progress-fill.rest { background: var(--rest); }

    .next-up {
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--neutral); min-height: 20px;
    }
    .next-up span { color: var(--text); }
    .next-up.done-msg { color: var(--go); font-size: 15px; }

    .timer-controls { display: flex; gap: 10px; width: 100%; }
    .ctrl-btn {
      flex: 1; padding: 18px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--neutral); font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 3px; cursor: pointer;
    }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn.primary { background: var(--go); color: #090909; border-color: var(--go); flex: 2; }
    .ctrl-btn.primary.paused { background: var(--surface); color: var(--go); border-color: var(--go); }
    .ctrl-btn.primary.done-state { background: var(--surface); color: var(--dim); border-color: var(--dim); }

    /* ── FLASH ── */
    #flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; z-index: 200; }
    #flash.flash-in { animation: flashAnim 0.35s ease-out forwards; }
    @keyframes flashAnim { 0% { opacity: 0.55; } 100% { opacity: 0; } }

    /* ── NOISE ── */
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAACXBIWXMAAAsTAAALEwEAmpwYAAAKT2lDQ1BQaG90b3Nob3AgSUNDIHByb2ZpbGUAAHjanVNnVFPpFj333vRCS4iAlEtvUhUIIFJCi4AUkSYqIQkQSoghodkVUcERRUUEG8igiAOOjoCMFVEsDIoK2AfkIaKOg6OIisr74Xuja9a89+bN/rXXPues852zzwfACAyWSDNRNYAMqUIeEeCDx8TG4eQuQIEKJHAAEAizZCFz/SMBAPh+PDwrIsAHvgABeNMLCADATZvAMByH/w/qQplcAYCEAcB0kThLCIAUAEB6jkKmAEBGAYCdmCZTAKAEAGDLY2LjAFAtAGAnf+bTAICd+Jl7AQBblCEVAaCRACATZYhEAGg7AKzPVopFAFgwABRmS8Q5ANgtADBJV2ZIALC3AMDOEAuyAAgMADBRiIUpAAR7AGDIIyN4AISZABRG8lc88SuuEOcqAAB4mbI8uSQ5RYFbCC1xB1dXLh4ozkkXKxQ2YQJhmkAuwnmZGTKBNA/g88wAAKCRFRHgg/P9eM4Ors7ONo62Dl8t6r8G/yJiYuP+5c+rcEAAAOF0ftH+LC+zGoA7BoBt/qIl7gRoXgugdfeLZrIPQLUAoOnaV/Nw+H48PEWhkLnZ2eXk5NhKxEJbYcpXff5nwl/AV/1s+X48/Pf14L7iJIEyXYFHBPjgwsz0TKUcz5IJhGLc5o9H/LcL//wd0yLESWK5WCoU41EScY5EmozzMqUiiUKSKcUl0v9k4t8s+wM+3zUAsGo+AXuRLahdYwP2SycQWHTA4vcAAPK7b8HUKAgDgGiD4c93/+8//UegJQCAZkmScQAAXkQkLlTKsz/HCAAARKCBKrBBG/TBGCzABhzBBdzBC/xgNoRCJMTCQhBCCmSAHHJgKayCQiiGzbAdKmAv1EAdNMBRaIaTcA4uwlW4Dj1wD/phCJ7BKLyBCQRByAgTYSHaiAFiilgjjggXmYX4IcFIBBKLJCDJiBRRIkuRNUgxUopUIFVIHfI9cgI5h1xGupE7yAAygvyGvEcxlIGyUT3UDLVDuag3GoRGogvQZHQxmo8WoJvQcrQaPYw2oefQq2gP2o8+Q8cwwOgYBzPEbDAuxsNCsTgsCZNjy7EirAyrxhqwVqwDu4n1Y8+xdwQSgUXACTYEd0IgYR5BSFhMWE7YSKggHCQ0EdoJNwkDhFHCJyKTqEu0JroR+cQYYjIxh1hILCPWEo8TLxB7iEPENyQSiUMyJ7mQAkmxpFTSEtJG0m5SI+ksqZs0SBojk8naZGuyBzmULCAryIXkneTD5DPkG+Qh8lsKnWJAcaT4U+IoUspqShnlEOU05QZlmDJBVaOaUt2ooVQRNY9aQq2htlKvUYeoEzR1mjnNgxZJS6WtopXTGmgXaPdpr+h0uhHdlR5Ol9BX0svpR+iX6AP0dwwNhhWDx4hnKBmbGAcYZxl3GK+YTKYZ04sZx1QwNzHrmOeZD5lvVVgqtip8FZHKCpVKlSaVGyovVKmqpqreqgtV81XLVI+pXlN9rkZVM1PjqQnUlqtVqp1Q61MbU2epO6iHqmeob1Q/pH5Z/YkGWcNMw09DpFGgsV/jvMYgC2MZs3gsIWsNq4Z1gTXEJrHN2Xx2KruY/R27iz2qqaE5QzNKM1ezUvOUZj8H45hx+Jx0TgnnKKeX836K3hTvKeIpG6Y0TLkxZVxrqpaXllirSKtRq0frvTau7aedpr1Fu1n7gQ5Bx0onXCdHZ4/OBZ3nU9lT3acKpxZNPTr1ri6qa6UbobtEd79up+6Gy7tu/yYvivMV0NvsW7f12teleqGR16teleqGR16deje2b/X+b7e+cP7B/YP7h/aH9w/un95/5n/mf+V/43teleqGR16Vy6vWV+svl9OX0Ffrl8uXyFfIV8lX6       background-repeat: repeat; pointer-events: none; z-index: 1; opacity: 0.08;
    }
  </style>

<body>
<div id="flash"></div>

<!-- ── MODE SELECT ── -->
<div class="screen active" id="screen-mode">
  <div class="mode-header">
    <h1>GYM TIMER</h1>
    <p>Select a mode</p>
  </div>
  <div class="mode-btn" onclick="selectMode('interval')">
    <div class="mode-label">INTERVAL  |  EMOM  |  TABATA</div>
  </div>
  <div class="mode-btn" onclick="selectMode('countdown')">
    <div class="mode-label">COUNTDOWN  |  AMRAP</div>
  </div>
  <div class="mode-btn" onclick="selectMode('stopwatch')">
    <div class="mode-label">FOR TIME  |  STOPWATCH</div>
  </div>
  <div class="autolock-tip">
    📱 <strong>Tip:</strong> Set Auto-Lock to <strong>Never</strong> during workouts.<br>
    Settings → Display & Brightness → Auto-Lock
  </div>
</div>

<!-- ── CONFIG ── -->
<div class="screen" id="screen-config">
  <div class="config-top-bar">
    <button class="back-btn" onclick="showScreen('mode')">
      <span class="back-arrow">‹</span> BACK
    </button>
    <div class="config-title-box">
      <div class="config-title" id="config-title">CONFIG</div>
    </div>
  </div>
  <div id="submode-container"></div>
  <div class="config-body" id="config-body"></div>
  <button class="start-btn" onclick="beginCountdown()">START</button>
</div>

<!-- ── PRE-START COUNTDOWN ── -->
<div class="screen" id="screen-countdown">
  <div class="cd-number" id="cd-number">10</div>
  <div class="cd-label">GET READY</div>
</div>

<!-- ── ACTIVE TIMER ── -->
<div class="screen" id="screen-timer">
  <div class="timer-top">
    <div class="phase-badge" id="phase-badge" aria-live="assertive" role="status">GO</div>
    <div class="round-display" id="round-display"></div>
  </div>
  <div class="timer-main">
    <div class="big-time go" id="big-time" aria-live="polite" aria-atomic="true">00:00</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="next-up" id="next-up" aria-live="polite"></div>
  </div>
  <div class="timer-controls">
    <button class="ctrl-btn" onclick="resetTimer()">RESET</button>
    <button class="ctrl-btn primary" id="play-pause-btn" onclick="togglePlayPause()">PAUSE</button>
  </div>
</div>

<script>
// ─────────────────────────── STATE ───────────────────────────────
let mode = null;     // 'interval' | 'countdown' | 'stopwatch'
let submode = null;  // 'interval'|'emom'|'tabata' or 'countdown'|'amrap' or 'fortime'|'stopwatch'
let cfg = {};
const ts = {
  status: 'idle', phaseIdx: 0, phases: [], round: 1,
  intervalId: null, lastRemSec: -1,
  phaseWallStart: 0, pausedElapsed: 0,
};
let audioCtx = null;
let wakeLock = null;
let countdownTimeout = null;

function getPhaseElapsed() {
  return ts.status === 'running'
    ? ts.pausedElapsed + (Date.now() - ts.phaseWallStart)
    : ts.pausedElapsed;
}

// ─────────────────────────── SCREENS ─────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ──────────────────────────── MODE ───────────────────────────────
function selectMode(m) {
  mode = m;
  if (m === 'interval') { submode = 'interval'; buildIntervalConfig(); }
  else if (m === 'countdown') { submode = 'countdown'; buildCountdownConfig(); }
  else if (m === 'stopwatch') { submode = 'fortime'; buildStopwatchConfig(); }
  showScreen('config');
}

// ────────────────────── SUBMODE TABS ─────────────────────────────
function buildTabs(tabs, activeTab) {
  const container = document.getElementById('submode-container');
  container.innerHTML = `<div class="submode-tabs">
    ${tabs.map(t => `<button class="submode-tab${t.id === activeTab ? ' active' : ''}"
      onclick="switchSubmode('${t.id}')">${t.label}</button>`).join('')}
  </div>`;
}

function switchSubmode(sm) {
  submode = sm;
  if (mode === 'interval') buildIntervalConfig();
  else if (mode === 'countdown') buildCountdownConfig();
  else if (mode === 'stopwatch') buildStopwatchConfig();
}

// ─────────────────── INTERVAL / EMOM / TABATA ────────────────────
function buildIntervalConfig() {
  document.getElementById('config-title').textContent = 'INTERVAL | EMOM | TABATA';
  buildTabs([
    { id: 'interval', label: 'INTERVAL' },
    { id: 'emom', label: 'EMOM' },
    { id: 'tabata', label: 'TABATA' },
  ], submode);

  const body = document.getElementById('config-body');
  let defWork, defRest, defRounds;
  if (submode === 'tabata')  { defWork = [0,20]; defRest = [0,10]; defRounds = 8; }
  else if (submode === 'emom') { defWork = [1,0]; defRest = [0,0]; defRounds = 10; }
  else { defWork = [0,40]; defRest = [0,20]; defRounds = 10; }

  body.innerHTML = `
    <div class="triple-picker">
      <div class="picker-group">
        <div class="picker-group-label">Work</div>
        <div class="picker-row" id="picker-work">
          <div class="picker-col">
            <div class="picker-scroller" id="ps-work-min">
              ${minItems(10)}
            </div>
          </div>
          <div class="picker-separator">:</div>
          <div class="picker-col">
            <div class="picker-scroller" id="ps-work-sec">
              ${secItems()}
            </div>
          </div>
        </div>
      </div>
      <div class="picker-group">
        <div class="picker-group-label">Rest</div>
        <div class="picker-row" id="picker-rest">
          <div class="picker-col">
            <div class="picker-scroller" id="ps-rest-min">
              ${minItems(10)}
            </div>
          </div>
          <div class="picker-separator">:</div>
          <div class="picker-col">
            <div class="picker-scroller" id="ps-rest-sec">
              ${secItems()}
            </div>
          </div>
        </div>
      </div>
      <div class="picker-group">
        <div class="picker-group-label">Rounds</div>
        <div class="picker-row" id="picker-rounds">
          <div class="picker-col">
            <div class="picker-scroller" id="ps-rounds">
              ${Array.from({length:50}, (_,i) => `<div class="picker-item" data-val="${i+1}">${String(i+1).padStart(2,'0')}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>`;

  requestAnimationFrame(() => {
    initScroller('ps-work-min', defWork[0]);
    initScroller('ps-work-sec', defWork[1]);
    initScroller('ps-rest-min', defRest[0]);
    initScroller('ps-rest-sec', defRest[1]);
    initScroller('ps-rounds', defRounds);
  });
}

// ─────────────────── COUNTDOWN / AMRAP ───────────────────────────
function buildCountdownConfig() {
  document.getElementById('config-title').textContent = 'COUNTDOWN | AMRAP';
  buildTabs([
    { id: 'countdown', label: 'COUNTDOWN' },
    { id: 'amrap', label: 'AMRAP' },
  ], submode);

  const body = document.getElementById('config-body');
  body.innerHTML = `
    <div class="field-group">
      <div class="field-label">Duration</div>
      <div class="picker-row" id="picker-duration">
        <div class="picker-col">
          <div class="picker-col-label">MIN</div>
          <div class="picker-scroller" id="ps-dur-min">
            ${minItems(99)}
          </div>
        </div>
        <div class="picker-separator">:</div>
        <div class="picker-col">
          <div class="picker-col-label">SEC</div>
          <div class="picker-scroller" id="ps-dur-sec">
            ${secItems()}
          </div>
        </div>
      </div>
    </div>`;

  requestAnimationFrame(() => {
    initScroller('ps-dur-min', 10);
    initScroller('ps-dur-sec', 0);
  });
}

// ─────────────────── FOR TIME / STOPWATCH ────────────────────────
function buildStopwatchConfig() {
  document.getElementById('config-title').textContent = 'FOR TIME | STOPWATCH';
  buildTabs([
    { id: 'fortime', label: 'FOR TIME' },
    { id: 'stopwatch', label: 'STOPWATCH' },
  ], submode);

  const body = document.getElementById('config-body');
  if (submode === 'fortime') {
    body.innerHTML = `
      <div class="field-group">
        <div class="field-label">Time Cap (optional)</div>
        <div class="picker-row" id="picker-cap">
          <div class="picker-col">
            <div class="picker-col-label">MIN</div>
            <div class="picker-scroller" id="ps-cap-min">
              <div class="picker-item" data-val="0">--</div>
              ${Array.from({length:99}, (_,i) => `<div class="picker-item" data-val="${i+1}">${String(i+1).padStart(2,'0')}</div>`).join('')}
            </div>
          </div>
          <div class="picker-separator">:</div>
          <div class="picker-col">
            <div class="picker-col-label">SEC</div>
            <div class="picker-scroller" id="ps-cap-sec">
              ${secItems()}
            </div>
          </div>
        </div>
      </div>`;
    requestAnimationFrame(() => {
      initScroller('ps-cap-min', 0);
      initScroller('ps-cap-sec', 0);
    });
  } else {
    body.innerHTML = `
      <div style="text-align:center; color:var(--neutral); font-size:14px; letter-spacing:2px; padding: 40px 0;">
        Simple count-up timer.<br>Tap START when ready.
      </div>`;
  }
}

// ─────────────────── PICKER HELPERS ──────────────────────────────
function minItems(max) {
  return Array.from({length: max+1}, (_,i) =>
    `<div class="picker-item" data-val="${i}">${String(i).padStart(2,'0')}</div>`
  ).join('');
}
function secItems() {
  return Array.from({length:12}, (_,i) =>
    `<div class="picker-item" data-val="${i*5}">${String(i*5).padStart(2,'0')}</div>`
  ).join('');
}

function initScroller(id, defaultVal) {
  const scroller = document.getElementById(id);
  if (!scroller) return;
  const itemH = 60;
  const pad = () => { const d = document.createElement('div'); d.style.height = itemH+'px'; d.style.flexShrink='0'; return d; };
  scroller.prepend(pad()); scroller.append(pad());

  let target = null;
  scroller.querySelectorAll('.picker-item').forEach(it => {
    if (parseInt(it.dataset.val) === defaultVal) target = it;
  });
  requestAnimationFrame(() => {
    if (target) scroller.scrollTop = target.offsetTop - scroller.offsetHeight/2 + itemH/2;
    updateHL(scroller);
  });
  let t = null;
  scroller.addEventListener('scroll', () => {
    clearTimeout(t);
    t = setTimeout(() => snapTo(scroller), 80);
    updateHL(scroller);
  }, { passive: true });
}

function snapTo(scroller) {
  const itemH = 60, centerY = scroller.scrollTop + scroller.offsetHeight/2;
  let closest = null, dist = Infinity;
  scroller.querySelectorAll('.picker-item').forEach(item => {
    const d = Math.abs(centerY - (item.offsetTop + itemH/2));
    if (d < dist) { dist = d; closest = item; }
  });
  if (closest) scroller.scrollTo({ top: closest.offsetTop - scroller.offsetHeight/2 + itemH/2, behavior: 'smooth' });
  updateHL(scroller);
}

function updateHL(scroller) {
  const itemH = 60, centerY = scroller.scrollTop + scroller.offsetHeight/2;
  let closest = null, dist = Infinity;
  scroller.querySelectorAll('.picker-item').forEach(item => {
    item.classList.remove('selected');
    const d = Math.abs(centerY - (item.offsetTop + itemH/2));
    if (d < dist) { dist = d; closest = item; }
  });
  if (closest) closest.classList.add('selected');
}

function pickerVal(id) {
  const el = document.getElementById(id);
  if (!el) return 0;
  const sel = el.querySelector('.picker-item.selected');
  return sel ? parseInt(sel.dataset.val) : 0;
}

// ──────────────────── COLLECT CONFIG ─────────────────────────────
function collectConfig() {
  const c = {};
  if (mode === 'interval') {
    c.work = pickerVal('ps-work-min') * 60 + pickerVal('ps-work-sec');
    c.rest = pickerVal('ps-rest-min') * 60 + pickerVal('ps-rest-sec');
    c.rounds = pickerVal('ps-rounds');
  } else if (mode === 'countdown') {
    c.duration = pickerVal('ps-dur-min') * 60 + pickerVal('ps-dur-sec');
  } else if (mode === 'stopwatch') {
    if (submode === 'fortime') {
      c.cap = pickerVal('ps-cap-min') * 60 + pickerVal('ps-cap-sec');
    }
  }
  return c;
}

// ──────────────────────────── PHASES ─────────────────────────────
function buildPhases(c) {
  if (mode === 'interval') {
    const p = [];
    for (let i = 1; i <= c.rounds; i++) {
      p.push({ name:'WORK', dur: c.work*1000, type:'go', round:i });
      if (c.rest > 0) p.push({ name:'REST', dur: c.rest*1000, type:'rest', round:i });
    }
    return p;
  } else if (mode === 'countdown') {
    return [{ name: submode === 'amrap' ? 'AMRAP' : 'GO', dur: c.duration*1000, type:'go', round:1 }];
  } else { // stopwatch
    const cap = (c.cap && c.cap > 0) ? c.cap * 1000 : 359999000; // ~100 hrs
    return [{ name: submode === 'fortime' ? 'FOR TIME' : 'GO', dur: cap, type:'go', round:1 }];
  }
}

// ─────────────────── PRE-START COUNTDOWN ─────────────────────────
function beginCountdown() {
  cfg = collectConfig();
  if (mode === 'interval' && cfg.work < 1) return;
  if (mode === 'countdown' && cfg.duration < 1) return;

  initAudio();
  showScreen('countdown');

  const cdEl = document.getElementById('cd-number');
  let count = 10;

  function showCount() {
    cdEl.textContent = count;
    cdEl.classList.remove('pop'); void cdEl.offsetWidth; cdEl.classList.add('pop');
    beep(440 + (10 - count) * 40, 0.15);
    if (count > 1) { count--; countdownTimeout = setTimeout(showCount, 900); }
    else {
      countdownTimeout = setTimeout(() => {
        cdEl.textContent = 'GO';
        cdEl.classList.remove('pop'); void cdEl.offsetWidth; cdEl.classList.add('pop');
        multiBeep(1047, 2, 100);
        doFlash(getComputedStyle(document.documentElement).getPropertyValue('--go').trim());
        countdownTimeout = setTimeout(startTimer, 600);
      }, 900);
    }
  }
  showCount();
}

// ──────────────────────────── START ──────────────────────────────
function startTimer() {
  const phases = buildPhases(cfg);
  Object.assign(ts, {
    status:'running', phaseIdx:0, phases, round:1,
    intervalId:null, lastRemSec:-1,
    phaseWallStart: Date.now(), pausedElapsed:0,
  });
  acquireWakeLock();
  showScreen('timer'); renderTimer(); tick();
}

// ──────────────────────────── TICK ───────────────────────────────
function tick() {
  if (ts.intervalId) return;
  ts.intervalId = setInterval(() => {
    if (ts.status !== 'running') return;
    const elapsed = getPhaseElapsed();
    const phase = ts.phases[ts.phaseIdx];
    const isCountUp = (submode === 'amrap' || mode === 'stopwatch');

    if (isCountUp && mode !== 'stopwatch') {
      if (elapsed >= phase.dur) { ts.pausedElapsed = phase.dur; finish(); return; }
    } else if (mode === 'stopwatch') {
      if (elapsed >= phase.dur) { ts.pausedElapsed = phase.dur; finish(); return; }
    } else {
      const remMs = phase.dur - elapsed;
      const remSec = Math.ceil(remMs / 1000);
      if (remSec !== ts.lastRemSec) {
        ts.lastRemSec = remSec;
        if (remSec >= 1 && remSec <= 3) beep(880, 0.15);
      }
      if (elapsed >= phase.dur) {
        const overshoot = elapsed - phase.dur;
        const nextIdx = ts.phaseIdx + 1;
        if (nextIdx >= ts.phases.length) { finish(); return; }
        ts.phaseIdx = nextIdx; ts.pausedElapsed = 0;
        ts.phaseWallStart = Date.now() - overshoot; ts.lastRemSec = -1;
        const next = ts.phases[ts.phaseIdx];
        ts.round = next.round;
        if (next.type === 'go') {
          doFlash(getComputedStyle(document.documentElement).getPropertyValue('--go').trim());
          multiBeep(1047, 2, 130);
        } else { doFlash('#FF3535'); multiBeep(330, 3, 110); }
      }
    }
    renderTimer();
  }, 50);
}

function finish() {
  ts.status = 'done'; clearInterval(ts.intervalId); ts.intervalId = null;
  releaseWakeLock();
  renderTimer(); doFlash('#C8FF00'); alarmBeep();
}

// ──────────────────────────── RENDER ─────────────────────────────
function renderTimer() {
  const phase = ts.phases[ts.phaseIdx];
  const done = ts.status === 'done';
  const paused = ts.status === 'paused';
  const elapsed = getPhaseElapsed();
  const isCountUp = (submode === 'amrap' || mode === 'stopwatch');

  const badge = document.getElementById('phase-badge');
  badge.textContent = done ? 'DONE' : phase.name;
  badge.className = 'phase-badge' + (done ? ' done' : phase.type === 'rest' ? ' rest' : '');

  let displayMs = isCountUp ? elapsed : Math.max(0, phase.dur - elapsed);
  const totalSec = isCountUp ? Math.floor(displayMs/1000) : Math.ceil(displayMs/1000);
  const mins = Math.floor(totalSec / 60);
  const secs = totalSec % 60;

  const bigTime = document.getElementById('big-time');
  bigTime.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
  bigTime.className = 'big-time' + (done ? ' done' : phase.type === 'rest' ? ' rest' : ' go');

  const pct = Math.min(100, (elapsed / phase.dur) * 100);
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.className = 'progress-fill' + (phase.type === 'rest' ? ' rest' : '');

  const roundEl = document.getElementById('round-display');
  roundEl.innerHTML = (mode === 'interval')
    ? `Round<strong>${phase.round} / ${cfg.rounds}</strong>` : '';

  const nextEl = document.getElementById('next-up');
  const nextIdx = ts.phaseIdx + 1;
  if (done) { nextEl.className = 'next-up done-msg'; nextEl.textContent = 'Great work! 💪'; }
  else if (nextIdx < ts.phases.length) {
    const next = ts.phases[nextIdx];
    nextEl.className = 'next-up';
    nextEl.innerHTML = `Next: <span>${next.name} — ${Math.round(next.dur/1000)}s</span>`;
  } else if (!isCountUp) { nextEl.className = 'next-up'; nextEl.innerHTML = `<span>Last phase!</span>`; }
  else { nextEl.textContent = ''; }

  const btn = document.getElementById('play-pause-btn');
  if (done) { btn.textContent = 'DONE'; btn.className = 'ctrl-btn primary done-state'; }
  else if (paused) { btn.textContent = 'RESUME'; btn.className = 'ctrl-btn primary paused'; }
  else { btn.textContent = 'PAUSE'; btn.className = 'ctrl-btn primary'; }
}

// ──────────────────────── CONTROLS ───────────────────────────────
function togglePlayPause() {
  if (ts.status === 'done') return;
  if (ts.status === 'running') {
    ts.pausedElapsed = getPhaseElapsed(); ts.status = 'paused';
    clearInterval(ts.intervalId); ts.intervalId = null;
  } else if (ts.status === 'paused') {
    ts.status = 'running'; ts.phaseWallStart = Date.now();
    tick(); acquireWakeLock();
  }
  renderTimer();
}

function resetTimer() {
  clearInterval(ts.intervalId); ts.intervalId = null;
  ts.status = 'idle'; clearTimeout(countdownTimeout);
  releaseWakeLock(); showScreen('mode');
}

// ──────────────────────────── AUDIO ──────────────────────────────
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq = 880, dur = 0.1) {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  try {
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) { const x = (i*2)/256-1; curve[i] = Math.max(-0.6, Math.min(0.6, x*3)); }
    const shaper = audioCtx.createWaveShaper(); shaper.curve = curve; shaper.oversample = '4x';
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value=-6; comp.knee.value=0; comp.ratio.value=20; comp.attack.value=0.001; comp.release.value=0.1;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    gain.connect(shaper); shaper.connect(comp); comp.connect(audioCtx.destination);
    const allNodes = [gain, shaper, comp];
    const oscs = [freq, freq*1.005, freq*0.995].map(f => {
      const osc = audioCtx.createOscillator(); osc.connect(gain);
      osc.frequency.value=f; osc.type='square';
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+dur); return osc;
    });
    const saw = audioCtx.createOscillator();
    const sawGain = audioCtx.createGain();
    sawGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    sawGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
    saw.connect(sawGain); sawGain.connect(comp);
    saw.frequency.setValueAtTime(freq, audioCtx.currentTime);
    saw.frequency.linearRampToValueAtTime(freq*1.08, audioCtx.currentTime+dur);
    saw.type='sawtooth'; saw.start(audioCtx.currentTime); saw.stop(audioCtx.currentTime+dur);
    allNodes.push(sawGain);
    saw.onended = () => {
      oscs.forEach(o => { try{o.disconnect();}catch(e){} });
      try{saw.disconnect();}catch(e){}
      allNodes.forEach(n => { try{n.disconnect();}catch(e){} });
    };
  } catch(e) {}
}

function multiBeep(freq, count, gapMs) {
  for (let i = 0; i < count; i++) setTimeout(() => beep(freq, 0.12), i * gapMs);
}
function alarmBeep() {
  for (let i = 0; i < 3; i++) setTimeout(() => beep(600 + i*300, 0.3), i * 320);
}

// ─────────────────────────── FLASH ───────────────────────────────
function doFlash(color) {
  const el = document.getElementById('flash');
  el.style.background = color;
  el.classList.remove('flash-in'); void el.offsetWidth;
  el.classList.add('flash-in');
}

// ──────────────────────── WAKE LOCK ──────────────────────────────
async function acquireWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { try { wakeLock.release(); } catch(e) {} wakeLock = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && ts.status === 'running') {
    acquireWakeLock();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    const prevPhaseIdx = ts.phaseIdx;
    let elapsed = getPhaseElapsed();
    let phase = ts.phases[ts.phaseIdx];
    while (elapsed >= phase.dur && ts.phaseIdx < ts.phases.length - 1) {
      const overshoot = elapsed - phase.dur;
      ts.phaseIdx++; const next = ts.phases[ts.phaseIdx];
      ts.round = next.round; ts.pausedElapsed = 0;
      ts.phaseWallStart = Date.now() - overshoot;
      phase = next; elapsed = overshoot;
    }
    if (elapsed >= phase.dur && ts.phaseIdx >= ts.phases.length - 1) { finish(); }
    else {
      if (ts.phaseIdx !== prevPhaseIdx) {
        doFlash(phase.type === 'rest' ? '#FF3535' : '#C8FF00');
        alarmBeep();
      }
      renderTimer();
    }
  }
});

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
